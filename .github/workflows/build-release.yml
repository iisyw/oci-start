name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, e.g. v1.0.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up JDK 8
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Resolve release tag
        id: release_meta
        env:
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is empty"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true

      - name: Generate checksum
        run: |
          cd oci-server/target
          shasum -a 256 oci-start-release.jar | awk '{print $1}' > oci-start-release.jar.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: oci-start-release
          path: |
            oci-server/target/oci-start-release.jar
            oci-server/target/oci-start-release.jar.sha256
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          files: |
            oci-server/target/oci-start-release.jar
            oci-server/target/oci-start-release.jar.sha256
